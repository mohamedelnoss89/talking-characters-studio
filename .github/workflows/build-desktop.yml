name: Build Desktop Installers

# This workflow builds the Electron desktop installers (.exe for Windows,
# .dmg for macOS) and publishes them to GitHub Releases.
#
# Triggers:
#   - Manually from the Actions tab ("Run workflow")
#   - On pushing a tag like "v1.0.1" (creates a release automatically)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.1)"
        required: true
        default: "1.0.1"
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create a release and upload assets

jobs:
  build-windows:
    name: Build Windows installer (.exe + portable + .zip)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Read version from package.json
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      # Build ALL three Windows artifacts in one electron-builder invocation:
      #   - NSIS installer:  TalkingCharactersStudio-Setup-1.0.x.exe
      #   - Portable:        TalkingCharactersStudio-Portable-1.0.x.exe
      #   - Unpacked dir:    dist/win-unpacked/   (we zip this manually below)
      - name: Build installers (NSIS + portable + unpacked)
        run: npx electron-builder --win nsis portable --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create the ZIP from the unpacked directory. The ZIP version is
      # RECOMMENDED on the install page because browsers don't trigger
      # SmartScreen on .zip downloads (only on .exe).
      - name: Create Windows ZIP from win-unpacked
        shell: pwsh
        run: |
          $version = "${{ steps.pkg.outputs.version }}"
          $zipName = "TalkingCharactersStudio-$version-windows.zip"
          Write-Host "Creating $zipName from dist/win-unpacked..."
          if (-not (Test-Path "dist/win-unpacked")) {
            Write-Error "dist/win-unpacked not found! electron-builder may have failed."
            exit 1
          }
          # Compress-Archive is built into PowerShell on Windows.
          # -Path *  includes everything inside win-unpacked (so the zip extracts
          #          to a flat folder, not a nested win-unpacked/ dir).
          Compress-Archive -Path "dist/win-unpacked/*" -DestinationPath "dist/$zipName" -CompressionLevel Optimal
          Write-Host "Created: dist/$zipName"
          Get-ChildItem dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            desktop/dist/*.exe
            desktop/dist/*.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS installer (.dmg)
    runs-on: macos-latest
    # macOS build is best-effort: hdiutil intermittently fails on GitHub runners.
    # We don't gate the release on macOS — it's marked "coming soon" on the
    # install page anyway. The release job runs as long as Windows succeeded.
    continue-on-error: true
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build installer
        run: npx electron-builder --mac dmg --x64 --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: desktop/dist/*.dmg
          if-no-files-found: error

  release:
    name: Publish to GitHub Releases
    # Only require Windows to succeed — macOS is best-effort (continue-on-error above)
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: extract version from tag (v1.0.1 → 1.0.1)
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "version=$TAG" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/

      - name: Try download macOS installer (best-effort, may not exist)
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: release-assets/
        continue-on-error: true

      - name: List release assets
        run: ls -la release-assets/ || true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Talking Characters Studio v${{ steps.version.outputs.version }}
          body: |
            # تحميل التطبيق — Download the App

            ## ⚠️ مهم: فك ضغط الـ ZIP الأول!
            لو حملت نسخة ZIP، **لازم تفك الضغط الأول** قبل ما تشغل الـ .exe.
            متشغلش الـ .exe من جوه الـ ZIP مباشرة (زي ما بيفتحه WinRAR) لأن ده بيخلق مجلد مؤقت هيتمسح.

            ## Windows
            - **موصى به**: حمّل ملف `.zip` → فك الضغط → شغّل الـ .exe جوه المجلد
            - أو حمّل ملف الـ `.exe` (Portable) وشغّله مباشرة
            - أول تشغيل هيفتح شاشة تثبيت Python والمكتبات أوتوماتيك
            - استنى 1-3 دقايق بعد التثبيت علشان الـ AI models تحمّل في الذاكرة

            ## macOS
            - حمّل ملف `.dmg` وافتحه
            - اسحب التطبيق لـ Applications
            - أول تشغيل: اضغط كليك يمين → Open (مرة واحدة بس)

            ## ملاحظات
            - الحجم: ~100MB (بدون الـ AI models)
            - أول تشغيل بينزل ~3GB من Python + PyTorch + Wav2Lip
            - الحد الأدنى: Windows 10 / macOS 11، 8GB RAM، 5GB مساحة فاضية
          files: |
            release-assets/*.exe
            release-assets/*.zip
            release-assets/*.dmg
          draft: false
          prerelease: false
